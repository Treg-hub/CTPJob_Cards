name: ctp_job_cards
description: "A new Flutter project."
publish_to: 'none'

version: 2.2.0+88
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.3

  # Firebase
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  firebase_storage: ^13.4.1
  firebase_messaging: ^16.2.2
  firebase_crashlytics: ^5.2.2
  cloud_functions: ^6.3.1
  firebase_remote_config: ^6.5.1

  connectivity_plus: ^7.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  fl_chart: ^1.2.0
  pdf: ^3.11.1
  share_plus: ^12.0.2
  path_provider: ^2.1.4
  cached_network_image: ^3.4.1
  pull_to_refresh_flutter3: ^2.0.2
  flutter_staggered_animations: ^1.1.1
  audioplayers: ^6.1.0

  # Location & Background
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  workmanager: ^0.9.0+3

  android_intent_plus: ^6.0.0
  file_picker: ^11.0.2
  csv: ^8.0.0
  image_picker: ^1.1.2
  mobile_scanner: ^7.0.0   # Code-128 barcode scanning for Ink Factory IBC receive
  rsa_driver_license_parsing: ^1.0.3   # SA driver licence PDF417 decrypt + parse
  flutter_image_compress: ^2.3.0
  uuid: ^4.5.0
  intl: ^0.20.2
  url_launcher: ^6.3.0
  package_info_plus: ^9.0.1
  torch_light: ^1.1.0
  flutter_local_notifications: ^21.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_markdown_plus: ^1.0.3
  signature: ^5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - docs/CHANGELOG.md
    - docs/app_features.md
    - docs/employee_guide.md
    - docs/escalation_system.md
    - docs/executive_overview.md
    - docs/manager_guide.md
    - docs/screens_reference.md
    - docs/troubleshooting.md
    - docs/waste_user_guide.md
    - docs/waste_pulse_guide.md
    - docs/Pilot_Verification_Checklist.md
    - docs/fleet_user_guide.md
    - docs/fleet_mechanic_guide.md
    - docs/fleet_reporter_guide.md
    - docs/fleet_cost_manager_guide.md
    - docs/security_guard_guide.md
    - docs/security_manager_mobile_guide.md

flutter_launcher_icons:
  image_path: "assets/images/logo.png"
  android: true
  ios: true
  windows:
    generate: true
  macos:
    generate: true
  linux:
    generate: true
  web:
    generate: true
