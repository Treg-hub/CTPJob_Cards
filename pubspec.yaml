name: ctp_job_cards
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.1+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.3

  # Firebase
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  firebase_storage: ^13.4.1
  firebase_messaging: ^16.2.2
  firebase_crashlytics: ^5.2.2
  cloud_functions: ^6.3.1
  firebase_remote_config: ^6.5.1

  connectivity_plus: ^7.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  fl_chart: ^1.2.0
  pdf: ^3.11.1
  share_plus: ^12.0.2
  path_provider: ^2.1.4
  cached_network_image: ^3.4.1
  pull_to_refresh_flutter3: ^2.0.2
  flutter_staggered_animations: ^1.1.1

  # Location & Background
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  workmanager: ^0.9.0+3

  android_intent_plus: ^6.0.0
  file_picker: ^11.0.2
  csv: ^8.0.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  uuid: ^4.5.0
  intl: ^0.20.2
  url_launcher: ^6.3.0
  package_info_plus: ^9.0.1
  torch_light: ^1.1.0
  flutter_local_notifications: ^21.0.0
  google_maps_flutter: ^2.17.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  image_path: "assets/images/logo.png"
  android: true
  ios: true
  windows:
    generate: true
  macos:
    generate: true
  linux:
    generate: true
  web:
    generate: true